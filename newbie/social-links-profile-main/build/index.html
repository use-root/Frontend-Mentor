<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Social links profile</title>
  </head>
  <body>
    <main class="card">
      <h1 class="hidden">Presentation Card</h1>
      <section class="card__information">
        <img
          src="../assets/images/avatar-jessica.jpeg"
          alt="profile-photo-jessica"
        />
        <header class="card__header">
          <h2 class="card__name">Jessica Randall</h2>
          <span class="card__location">London, United Kingdom</span>
        </header>
        <p class="card__description">"Front-end developer and avid reader."</p>
      </section>

      <ul class="card__links">
        <li class="card__wrapper"><a class="card__link" href="">GitHub </a></li>
        <li class="card__wrapper">
          <a
            class="card__link"
            href="https://www.frontendmentor.io/profile/use-root"
            >Frontend Mentor</a
          >
        </li>
        <li class="card__wrapper">
          <a class="card__link" href="in/ezequiel-cordova-1334583b5"
            >LinkedIn</a
          >
        </li>
        <li class="card__wrapper"><a class="card__link" href="#">X</a></li>
        <li class="card__wrapper">
          <a class="card__link" href="">Instagram</a>
        </li>
      </ul>
    </main>
  </body>
</html>
