<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Social links profile</title>
  </head>

  <body>
    <main class="card">
      <h1 class="visually-hidden">Presentation Card</h1>
      <section class="card__information">
        <div class="card__markimg">
          <img
            class="card__avatar"
            src="./assets/images/ilustration/avatar-jessica.jpeg"
            alt="profile-photo-jessica"
          />
        </div>
        <header class="card__header">
          <h2 class="card__name">Jessica Randall</h2>
          <span class="card__location">London, United Kingdom</span>
        </header>
        <p class="card__description">"Front-end developer and avid reader."</p>
      </section>

      <ul class="card__list">
        <li class="card__wrapper">
          <a
            class="card__link"
            href="https://www.github.com/use-root"
            target="_blank"
            >GitHub</a
          >
        </li>
        <li class="card__wrapper">
          <a
            class="card__link"
            href="https://www.frontendmentor.io/profile/use-root"
            target="_blank"
          >
            Frontend Mentor
          </a>
        </li>
        <li class="card__wrapper">
          <a
            class="card__link"
            href="https://www.frontendmentor.io/profile/use-root"
            target="_blank"
          >
            LinkedIn
          </a>
        </li>
        <li class="card__wrapper">
          <a
            class="card__link"
            href="https://www.frontendmentor.io/profile/use-root"
            target="_blank"
          >
            X
          </a>
        </li>
        <li class="card__wrapper">
          <a class="card__link" href="#" target="_blank">Instagram</a>
        </li>
      </ul>
    </main>
  </body>
</html>
